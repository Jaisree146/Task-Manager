version: "3.9"
services:
  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "5000:5000"
    env_file:
      - ./auth-service/.env
  task-service:
    build: ./task-service
    container_name: task-service
    ports:
      - "5001:5001"
    env_file:
      - ./task-service/.env